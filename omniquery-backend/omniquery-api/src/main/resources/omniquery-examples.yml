omniquery:
  rag:
    examples:
      - question: recent orders with customer names
        sql: SELECT o.id, c.name AS customer_name, o.status, o.total_amount, o.created_at FROM orders o JOIN customers c ON c.id = o.customer_id ORDER BY o.created_at DESC LIMIT 100
        tables:
          - orders
          - customers
        explanation: Join orders with customers and sort by creation time.
      - question: total paid amount by customer
        sql: SELECT c.name AS customer_name, SUM(o.total_amount) AS total_paid FROM orders o JOIN customers c ON c.id = o.customer_id WHERE o.status = 'PAID' GROUP BY c.name LIMIT 100
        tables:
          - orders
          - customers
        explanation: Aggregate paid order totals by customer.
