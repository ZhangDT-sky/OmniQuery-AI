services:
  mysql:
    image: mysql:8.0
    container_name: omniquery-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omniquery_demo}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - omniquery_mysql_data:/var/lib/mysql
      - ./scripts/mysql-demo.sql:/docker-entrypoint-initdb.d/01-mysql-demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: omniquery-pgvector
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - omniquery_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: omniquery-backend/Dockerfile
    container_name: omniquery-api
    environment:
      SPRING_PROFILES_ACTIVE: mysql,llm,vector-rag
      MODEL_API_KEY: ${MODEL_API_KEY}
      OMNIQUERY_LLM_BASE_URL: ${OMNIQUERY_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OMNIQUERY_LLM_MODEL: ${OMNIQUERY_LLM_MODEL:-kimi-k2.6}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      OMNIQUERY_EMBEDDING_BASE_URL: ${OMNIQUERY_EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1/embeddings}
      OMNIQUERY_EMBEDDING_MODEL: ${OMNIQUERY_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      OMNIQUERY_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-omniquery_demo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      OMNIQUERY_MYSQL_USERNAME: root
      OMNIQUERY_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      OMNIQUERY_VECTOR_JDBC_URL: jdbc:postgresql://pgvector:5432/postgres
      OMNIQUERY_VECTOR_USERNAME: postgres
      OMNIQUERY_VECTOR_PASSWORD: ${POSTGRES_PASSWORD:-root}
      OMNIQUERY_VECTOR_DIMENSIONS: ${OMNIQUERY_VECTOR_DIMENSIONS:-1024}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: omniquery-frontend/Dockerfile
    container_name: omniquery-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  omniquery_mysql_data:
  omniquery_pgvector_data:
